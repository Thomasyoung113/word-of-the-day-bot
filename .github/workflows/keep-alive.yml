name: Keep Render bot awake

on:
  schedule:
    # Every 10 minutes — comfortably under Render's 15-minute spin-down window.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check endpoint
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" https://word-of-the-day-bot.onrender.com/ \
            || echo "Ping failed — service may be cold-starting or down"
