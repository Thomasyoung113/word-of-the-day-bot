services:
  - type: web
    name: word-of-the-day-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BYNARA_API_KEY
        sync: false
      - key: BYNARA_BASE_URL
        value: https://router.bynara.id/v1
      - key: BYNARA_MODEL
        value: mistral-medium-3-5
      - key: STATE_DIR
        value: /var/data
    disk:
      name: wotd-state
      mountPath: /var/data
      sizeGB: 1